server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /homa-vidhanam/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /homa-vidhanam/index.html;
    }

    location /homa-vidhanam/static/ {
        alias /usr/share/nginx/html/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        return 302 /homa-vidhanam/;
    }
}
